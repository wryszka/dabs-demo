# Insurance Claims Risk Scoring — Multi-Task Workflow
# Task chain: ingest_claims -> score_risk

resources:
  jobs:
    insurance_claims_job:
      name: insurance_claims_risk_scoring

      # --- Schedule: daily at 6 AM UTC ---
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC

      # --- Permissions (uncomment if 'claims_auditors' group exists in your workspace) ---
      # permissions:
      #   - group_name: claims_auditors
      #     level: CAN_VIEW

      # --- Job-level parameters ---
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: landing_zone_path
          default: ${var.landing_zone_path}

      # --- Task definitions ---
      tasks:
        # Task 1: Ingest raw claims data from landing zone into Unity Catalog
        - task_key: ingest_claims
          spark_python_task:
            python_file: ../src/ingest.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--landing-zone"
              - ${var.landing_zone_path}
          environment_key: default

        # Task 2: Run ML risk scoring model against ingested claims
        - task_key: score_risk
          depends_on:
            - task_key: ingest_claims
          spark_python_task:
            python_file: ../src/scoring.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"

      queue:
        enabled: true
