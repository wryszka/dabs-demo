# Insurance Claims Risk Scoring Pipeline — Databricks Asset Bundle
# Production-grade configuration with dev/prod targets and Unity Catalog integration
#
# SETUP: Before running, set your workspace host below.
#        Optionally set a profile if you have multiple in ~/.databrickscfg.
#        Update catalog/schema variables to match your Unity Catalog.

bundle:
  name: insurance_claims_risk_scoring

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog for this environment
  schema:
    description: Unity Catalog schema for claims data
  landing_zone_path:
    description: Path to the raw claims data landing zone

targets:
  # ---------------------------------------------------------------------------
  # DEV — single-node cluster, development mode (resource prefix + paused schedules)
  # ---------------------------------------------------------------------------
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-lr-classic-aws-us.cloud.databricks.com/    # <-- REPLACE with your workspace URL
      profile: DEFAULT          # <-- Uncomment and set if you have multiple CLI profiles
    variables:
      catalog: lr_classic_aws_us_catalog       # <-- Change to your dev catalog
      schema: claims
      landing_zone_path: /Volumes/lr_classic_aws_us_catalog/claims/landing

  # ---------------------------------------------------------------------------
  # PROD — autoscaling cluster, production mode (strict identity, no prefix)
  # ---------------------------------------------------------------------------
  prod:
    mode: production
    workspace:
      host: https://fevm-lr-serverless-aws-us.cloud.databricks.com    # <-- REPLACE with your workspace URL
      # profile: DEFAULT          # <-- Uncomment and set if you have multiple CLI profiles
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: lr_classic_aws_us_catalog      # <-- Change to your prod catalog
      schema: claims
      landing_zone_path: /Volumes/lr_classic_aws_us_catalog/claims/landing
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
